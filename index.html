<!DOCTYPE html>
<html lang="ru">
<head>
  <link rel="icon" type="image/png" sizes="64x64" href="assets/images/fox-logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiny Fox Studio 🦊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #0f0e17;
      color: #fffffe;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .hero {
      text-align: center;
      padding: 2rem;
      max-width: 680px;
      position: relative;
      z-index: 1;
    }

    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 1.2rem;
      animation: float 3s ease-in-out infinite;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .logo img {
      width: 72px;
      height: 72px;
      image-rendering: pixelated;
      display: block;
    }

    .logo:active { transform: scale(0.92); }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-12px); }
    }

    /* click ripple */
    .logo::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid rgba(255,137,6,0);
      transition: none;
    }
    .logo.pulse::after {
      animation: ripple 0.4s ease-out forwards;
    }
    @keyframes ripple {
      0%   { inset: -2px; border-color: rgba(255,137,6,0.7); }
      100% { inset: -18px; border-color: rgba(255,137,6,0); }
    }

    h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(15px, 3.2vw, 26px);
      color: #ff8906;
      line-height: 1.5;
      margin-bottom: 1rem;
      text-shadow: 0 0 40px rgba(255,137,6,0.35);
    }

    .tagline {
      font-size: 1rem;
      color: #a7a9be;
      margin-bottom: 2rem;
      line-height: 1.7;
    }

    .tags {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 2.2rem;
    }

    .tag {
      background: rgba(255,137,6,0.08);
      border: 1px solid rgba(255,137,6,0.4);
      color: #ff8906;
      padding: 0.45rem 1.1rem;
      border-radius: 99px;
      font-size: 0.85rem;
      font-weight: 500;
      transition: background 0.2s, transform 0.15s;
    }
    .tag:hover {
      background: rgba(255,137,6,0.18);
      transform: translateY(-2px);
    }

    .links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .vk-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 26px;
      border-radius: 99px;
      background: linear-gradient(135deg, #0077ff 0%, #0057cc 100%);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 4px 22px rgba(0,119,255,0.35);
      transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
    }
    .vk-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(0,119,255,0.5);
      filter: brightness(1.1);
    }

    .boosty-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 26px;
      border-radius: 99px;
      background: linear-gradient(135deg, #F4722A 0%, #E03A0A 100%);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 4px 22px rgba(240,90,20,0.4);
      transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
    }
    .boosty-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(240,90,20,0.55);
      filter: brightness(1.08);
    }

    .contact a {
      font-size: 0.9rem;
      color: #ff8906;
      text-decoration: none;
      opacity: 0.75;
      transition: opacity 0.2s;
    }
    .contact a:hover { opacity: 1; text-decoration: underline; }

    /* hint */
    .hint {
      margin-top: 2.5rem;
      font-size: 0.72rem;
      color: rgba(167,169,190,0.4);
      letter-spacing: 0.3px;
    }

    .bottom-btns {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .joy-btn {
      background: rgba(107,79,187,0.12);
      border: 1px solid rgba(107,79,187,0.4);
      color: #a48fe8;
      padding: 7px 18px;
      border-radius: 99px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.15s;
    }
    .joy-btn:hover {
      background: rgba(107,79,187,0.25);
      transform: translateY(-1px);
    }
    .joy-btn.active {
      background: rgba(107,79,187,0.3);
      border-color: rgba(107,79,187,0.7);
      color: #c8b8ff;
    }

    @keyframes particle-fly {
      0%   { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }

    .particle {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1000;
      animation: particle-fly 0.7s ease-out forwards;
    }

    @keyframes catch-text {
      0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
      30%  { opacity: 1; transform: translate(-50%, -80%) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%, -140%) scale(1); }
    }

    .catch-label {
      position: fixed;
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255,215,0,0.8);
      pointer-events: none;
      z-index: 1001;
      white-space: nowrap;
      animation: catch-text 0.9s ease-out forwards;
    }

    .joystick-prey {
      position: fixed;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      line-height: 1;
      z-index: 998;
      pointer-events: none;
      filter: drop-shadow(0 0 12px rgba(107,79,187,0.7));
    }

    .clear-btn {
      display: none;
      margin-top: 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(167,169,190,0.7);
      padding: 7px 18px;
      border-radius: 99px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.15s;
    }
    .clear-btn:hover {
      background: rgba(255,80,80,0.12);
      border-color: rgba(255,80,80,0.35);
      color: #ff7070;
      transform: translateY(-1px);
    }
    .clear-btn.visible { display: inline-block; }

    .fox-counter {
      display: none;
      font-size: 0.72rem;
      color: rgba(255,137,6,0.5);
      margin-top: 0.5rem;
    }
    .fox-counter.visible { display: block; }

    /* ── Roaming fox ── */
    .roamer {
      position: fixed;
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      pointer-events: auto;
      cursor: context-menu;
      filter: drop-shadow(0 3px 10px rgba(255,137,6,0.5));
      will-change: transform, left, top;
    }

    .roamer img {
      width: 56px;
      height: 56px;
      image-rendering: pixelated;
    }

    .roamer span {
      font-size: 48px;
      line-height: 1;
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="logo" id="mainLogo" title="Нажми!">
      <img src="assets/images/fox-logo.png" alt="🦊"
           onerror="this.outerHTML='<span style=\'font-size:64px;line-height:1\'>🦊</span>'">
    </div>

    <h1>Tiny Fox Studio</h1>

    <p class="tagline">
      Создаю игры и прокачиваю мастерство.<br>
      От прототипов — к полноценным проектам.
    </p>

    <div class="tags">
      <span class="tag">✨ Прототипы</span>
      <span class="tag">🧪 Механики</span>
      <span class="tag">🚀 Игры</span>
      <span class="tag">🎮 Инди</span>
    </div>

    <div class="links">
      <a class="boosty-btn" href="https://boosty.to/faulheit" target="_blank" rel="noopener">
        ⚡ Поддержать на Boosty
      </a>
      <a class="vk-btn" href="https://vk.com/tinyfoxstudio" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15.07 2H8.93C3.33 2 2 3.33 2 8.93v6.14C2 20.67 3.33 22 8.93 22h6.14C20.67 22 22 20.67 22 15.07V8.93C22 3.33 20.67 2 15.07 2zm2.83 13.5h-1.5c-.57 0-.74-.45-1.76-1.49-.88-.87-1.27-.99-1.49-.99-.3 0-.39.09-.39.52v1.36c0 .37-.12.59-1.1.59-1.62 0-3.42-.98-4.68-2.82C5.2 10.5 4.77 8.74 4.77 8.37c0-.22.09-.43.52-.43h1.5c.39 0 .53.17.68.58.75 2.16 2.01 4.05 2.53 4.05.19 0 .28-.09.28-.58V9.77c-.06-1.04-.61-1.13-.61-1.5 0-.19.15-.37.4-.37h2.36c.33 0 .45.17.45.55v2.96c0 .33.15.45.24.45.19 0 .36-.12.72-.48 1.11-1.24 1.9-3.15 1.9-3.15.1-.22.3-.43.69-.43h1.5c.45 0 .55.23.45.55-.19.87-2.01 3.44-2.01 3.44-.16.26-.22.37 0 .66.16.22.69.68 1.04 1.09.65.74 1.14 1.36 1.27 1.79.13.42-.09.63-.52.63z"/></svg>
        Сообщество ВК
      </a>

    </div>

    <p class="hint" id="hint">кликни на лисёнка · ПКМ чтобы убрать одного</p>
    <p class="fox-counter" id="foxCounter">🦊 × 0 / 30</p>
    <div class="bottom-btns">
      <button class="joy-btn" id="joyBtn">🎮 спавнить джойстик</button>
      <button class="clear-btn" id="clearBtn">✕ убрать всех</button>
    </div>
  </div>

  <script>
    const logo     = document.getElementById('mainLogo');
    const clearBtn = document.getElementById('clearBtn');
    const joyBtn   = document.getElementById('joyBtn');
    const counter  = document.getElementById('foxCounter');
    const hint     = document.getElementById('hint');
    const MAX = 30;
    const SIZE_FOX = 56;
    const SIZE_JOY = 52;

    const roamers = []; // { el, alive, x, y, vx, vy }

    // ── Joystick state ──
    let joy = null; // { el, x, y, vx, vy, alive }

    function updateUI() {
      const alive = roamers.filter(r => r.alive).length;
      counter.textContent = `🦊 × ${alive} / ${MAX}`;
      counter.classList.toggle('visible', alive > 0);
      clearBtn.classList.toggle('visible', alive > 0 || joy);
      joyBtn.textContent = joy ? '🎮 убрать джойстик' : '🎮 спавнить джойстик';
      joyBtn.classList.toggle('active', !!joy);
      hint.textContent = joy
        ? 'лисята охотятся за джойстиком 🏃 · ПКМ по лисёнку — убрать'
        : 'кликни на лисёнка · ПКМ чтобы убрать одного';
    }

    // ── Fireworks ──
    const COLORS = ['#ff8906','#ffd700','#ff4ecd','#00e5ff','#a8ff3e','#ff6b6b','#c8b8ff'];
    let lastCatch = 0;

    function spawnFireworks(cx, cy) {
      const now = Date.now();
      if (now - lastCatch < 300) return; // debounce rapid catches
      lastCatch = now;

      // Particles burst
      const count = 22;
      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'particle';
        const angle  = (i / count) * Math.PI * 2 + Math.random() * 0.3;
        const dist   = 55 + Math.random() * 80;
        const tx     = Math.cos(angle) * dist;
        const ty     = Math.sin(angle) * dist;
        const color  = COLORS[Math.floor(Math.random() * COLORS.length)];
        const size   = 6 + Math.random() * 8;
        el.style.cssText = `
          left: ${cx}px; top: ${cy}px;
          width: ${size}px; height: ${size}px;
          background: ${color};
          box-shadow: 0 0 6px ${color};
          --tx: ${tx}px; --ty: ${ty}px;
          animation-duration: ${0.5 + Math.random() * 0.4}s;
          animation-delay: ${Math.random() * 0.08}s;
        `;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 900);
      }

      // "ПОЙМАЛ!" label
      const labels = ['ПОЙМАЛ!', 'ГАВ!', '🦊✓', 'НЯМ!'];
      const label = document.createElement('div');
      label.className = 'catch-label';
      label.textContent = labels[Math.floor(Math.random() * labels.length)];
      label.style.left = cx + 'px';
      label.style.top  = cy + 'px';
      document.body.appendChild(label);
      setTimeout(() => label.remove(), 950);
    }

    // ── Joystick logic ──
    function spawnJoystick() {
      if (joy) { removeJoystick(); return; }

      const el = document.createElement('div');
      el.className = 'joystick-prey';
      el.textContent = '🎮';
      document.body.appendChild(el);

      joy = {
        el,
        x: window.innerWidth  / 2 - SIZE_JOY / 2,
        y: window.innerHeight / 2 - SIZE_JOY / 2,
        vx: (Math.random() - 0.5) * 3,
        vy: (Math.random() - 0.5) * 3,
        alive: true
      };

      el.style.left = joy.x + 'px';
      el.style.top  = joy.y + 'px';

      updateUI();
      tickJoystick();
    }

    function removeJoystick() {
      if (!joy) return;
      joy.alive = false;
      joy.el.style.transition = 'opacity 0.3s, transform 0.3s';
      joy.el.style.opacity = '0';
      joy.el.style.transform = 'scale(0.3)';
      setTimeout(() => { joy.el.remove(); joy = null; updateUI(); }, 320);
      joy.alive = false; // mark immediately so foxes stop chasing
    }

    function tickJoystick() {
      if (!joy || !joy.alive) return;

      const W = window.innerWidth  - SIZE_JOY;
      const H = window.innerHeight - SIZE_JOY;
      const FLEE_SPEED = 3.8;
      const WANDER = 0.04;

      // Find nearest alive fox
      let nearestDist = Infinity;
      let nearestFox  = null;
      for (const r of roamers) {
        if (!r.alive) continue;
        const dx = r.x - joy.x;
        const dy = r.y - joy.y;
        const d  = Math.sqrt(dx * dx + dy * dy);
        if (d < nearestDist) { nearestDist = d; nearestFox = r; }
      }

      if (nearestFox && nearestDist < 350) {
        // Flee from nearest fox
        const dx = joy.x - nearestFox.x;
        const dy = joy.y - nearestFox.y;
        const d  = Math.sqrt(dx * dx + dy * dy) || 1;
        const urgency = Math.min(1, 200 / nearestDist);
        joy.vx += (dx / d) * FLEE_SPEED * urgency * 0.15;
        joy.vy += (dy / d) * FLEE_SPEED * urgency * 0.15;
      } else {
        // Wander randomly
        joy.vx += (Math.random() - 0.5) * WANDER * 6;
        joy.vy += (Math.random() - 0.5) * WANDER * 6;
      }

      // Clamp speed
      const spd = Math.sqrt(joy.vx ** 2 + joy.vy ** 2);
      const maxSpd = nearestFox && nearestDist < 200 ? 5.5 : 3.2;
      if (spd > maxSpd) { joy.vx = joy.vx / spd * maxSpd; joy.vy = joy.vy / spd * maxSpd; }

      joy.x += joy.vx;
      joy.y += joy.vy;

      // Wrap-around (snake style)
      if (joy.x < -SIZE_JOY)  joy.x = W + SIZE_JOY;
      if (joy.x > W + SIZE_JOY) joy.x = -SIZE_JOY;
      if (joy.y < -SIZE_JOY)  joy.y = H + SIZE_JOY;
      if (joy.y > H + SIZE_JOY) joy.y = -SIZE_JOY;

      joy.el.style.left = joy.x + 'px';
      joy.el.style.top  = joy.y + 'px';

      requestAnimationFrame(tickJoystick);
    }

    // ── Fox logic ──
    function spawnFox(startX, startY) {
      if (roamers.filter(r => r.alive).length >= MAX) {
        logo.style.transition = 'transform 0.08s';
        [6, -6, 4, -4, 0].forEach((v, i) =>
          setTimeout(() => logo.style.transform = `translateX(${v}px)`, i * 70)
        );
        return;
      }

      const el = document.createElement('div');
      el.className = 'roamer';
      el.innerHTML = `<img src="assets/images/fox-logo.png" alt="🦊" onerror="this.outerHTML='<span>🦊</span>'">`;
      document.body.appendChild(el);

      const speed = 2.8 + Math.random() * 1.8;
      const state = {
        el,
        alive: true,
        x: startX - SIZE_FOX / 2,
        y: startY - SIZE_FOX / 2,
        vx: Math.cos(Math.random() * Math.PI * 2) * speed,
        vy: Math.sin(Math.random() * Math.PI * 2) * speed,
        flipped: false
      };
      roamers.push(state);
      updateUI();

      el.style.left = state.x + 'px';
      el.style.top  = state.y + 'px';

      function tick() {
        if (!state.alive) return;

        const W = window.innerWidth  - SIZE_FOX;
        const H = window.innerHeight - SIZE_FOX;
        const CHASE_SPEED = 3.5;

        if (joy && joy.alive) {
          // Chase joystick
          const dx = joy.x - state.x;
          const dy = joy.y - state.y;
          const d  = Math.sqrt(dx * dx + dy * dy) || 1;
          state.vx += (dx / d) * 0.25;
          state.vy += (dy / d) * 0.25;

          // Clamp to chase speed
          const spd = Math.sqrt(state.vx ** 2 + state.vy ** 2);
          if (spd > CHASE_SPEED) {
            state.vx = state.vx / spd * CHASE_SPEED;
            state.vy = state.vy / spd * CHASE_SPEED;
          }

          // Catch detection
          if (d < 36) {
            // Fireworks!
            spawnFireworks(joy.x + SIZE_JOY / 2, joy.y + SIZE_JOY / 2);

            // Give joystick a burst away
            joy.vx = -(dx / d) * 6;
            joy.vy = -(dy / d) * 6;
          }
        } else {
          // Bounce / roam freely
          const spd = Math.sqrt(state.vx ** 2 + state.vy ** 2);
          const freeSpeed = 3.5;
          if (spd > freeSpeed) {
            state.vx = state.vx / spd * freeSpeed;
            state.vy = state.vy / spd * freeSpeed;
          }
        }

        state.x += state.vx;
        state.y += state.vy;

        if (state.x <= 0) { state.x = 0; state.vx =  Math.abs(state.vx); }
        if (state.x >= W) { state.x = W; state.vx = -Math.abs(state.vx); }
        if (state.y <= 0) { state.y = 0; state.vy =  Math.abs(state.vy); }
        if (state.y >= H) { state.y = H; state.vy = -Math.abs(state.vy); }

        const shouldFlip = state.vx < 0;
        if (shouldFlip !== state.flipped) {
          state.flipped = shouldFlip;
          el.style.transform = state.flipped ? 'scaleX(-1)' : 'scaleX(1)';
        }

        el.style.left = state.x + 'px';
        el.style.top  = state.y + 'px';

        requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);

      el.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        state.alive = false;
        el.style.transition = 'opacity 0.25s, transform 0.25s';
        el.style.opacity = '0';
        el.style.transform = (state.flipped ? 'scaleX(-1) ' : '') + 'scale(0.4)';
        setTimeout(() => { el.remove(); updateUI(); }, 270);
        updateUI();
      });
    }

    // ── Listeners ──
    logo.addEventListener('click', () => {
      logo.classList.remove('pulse');
      void logo.offsetWidth;
      logo.classList.add('pulse');
      const rect = logo.getBoundingClientRect();
      spawnFox(rect.left + rect.width / 2, rect.top + rect.height / 2);
    });

    joyBtn.addEventListener('click', spawnJoystick);

    clearBtn.addEventListener('click', () => {
      removeJoystick();
      roamers.forEach(state => {
        if (!state.alive) return;
        state.alive = false;
        state.el.style.transition = 'opacity 0.3s, transform 0.3s';
        state.el.style.opacity = '0';
        state.el.style.transform = 'scale(0.3)';
        setTimeout(() => state.el.remove(), 320);
      });
      setTimeout(updateUI, 330);
    });
  </script>
</body>
</html>
